<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>You're Offline — SignSpeak AI</title>
<meta name="theme-color" content="#0F1420" />
<link rel="stylesheet" href="./css/base.css" />
<link rel="stylesheet" href="./css/components.css" />
<link rel="stylesheet" href="./css/layout.css" />
</head>
<body>
<main class="auth-page">
  <div class="auth-card card" style="text-align:center;">
    <svg class="hand-motif" viewBox="0 0 120 120" aria-hidden="true" style="margin:0 auto var(--space-4);">
      <line x1="60" y1="60" x2="40" y2="25" /><line x1="60" y1="60" x2="52" y2="18" />
      <line x1="60" y1="60" x2="66" y2="17" /><line x1="60" y1="60" x2="80" y2="25" />
      <line x1="60" y1="60" x2="90" y2="70" />
      <circle class="pulse" cx="60" cy="60" r="4" /><circle cx="40" cy="25" r="3" />
      <circle cx="52" cy="18" r="3" /><circle cx="66" cy="17" r="3" />
      <circle cx="80" cy="25" r="3" /><circle cx="90" cy="70" r="3" />
    </svg>
    <h1>You're offline</h1>
    <p>SignSpeak AI needs a connection to sign in and sync history. Pages you've already visited are still available.</p>
    <button class="btn btn--primary" onclick="location.reload()">Try Again</button>
  </div>
</main>
</body>
</html>
